  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="315" r="120" fill="url(#accent)"/>
  <image href="/profile-og.jpg" x="65" y="200" width="230" height="230" preserveAspectRatio="xMidYMid slice" clip-path="url(#avatarClip)"/>
  <text x="330" y="275" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#fff">Hamza Ahmed</text>
  <text x="330" y="340" font-family="Arial, sans-serif" font-size="34" fill="#cbd5e1">Senior Full Stack Developer</text>
  <text x="330" y="390" font-family="Arial, sans-serif" font-size="30" fill="#cbd5e1">Angular • Ionic • NestJS • Node.js • AWS • Firebase</text>
</svg>
